<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>字幕单词本</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">字幕单词本</div>
      <div class="meta" id="count"></div>
    </div>

    <div class="toolbar">
      <input id="q" class="search" placeholder="搜索单词 / 英文句 / 词典解释 / 中文字幕..." />
      <button id="export" class="btn">导出 Anki TSV</button>
      <button id="exportWordsCsv" class="btn">导出词表 CSV</button>
      <button id="exportWordCountCsv" class="btn">导出词频 CSV</button>
      <button id="clear" class="btn danger">清空</button>
    </div>

    <div class="hint" style="margin-top:8px;">
      <label style="display:flex; gap:8px; align-items:center;">
        <input type="checkbox" id="autoSave" />
        点击字幕自动保存（推荐配合 Language Reactor）
      </label>
      <div style="margin-top:6px; opacity:.75;">
        关闭后：按住 Alt 再点击字幕才会保存
      </div>
    </div>

    <div class="hint">
      这版支持 Netflix / YouTube + Language Reactor；只在点到英文字幕时保存，并会等待 LR 打开大词典窗口后提取解释内容。
    </div>
    <div class="hint">
      Anki 导出格式：正面 = 单词 + 英文句；背面 = 中文句 + LR 大词典解释（若已捕获）。导入时请勾选 Allow HTML in fields。
    </div>

    <div id="list" class="list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
